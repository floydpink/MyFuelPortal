<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="40%" stop-color="#4CAF50"/>
      <stop offset="70%" stop-color="#388E3C"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#757575"/>
      <stop offset="50%" stop-color="#BDBDBD"/>
      <stop offset="100%" stop-color="#616161"/>
    </linearGradient>
    <linearGradient id="valve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#616161"/>
      <stop offset="50%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#424242"/>
    </linearGradient>
  </defs>
  <!-- Tank body -->
  <rect x="156" y="140" width="200" height="300" rx="100" fill="url(#tank)"/>
  <!-- Tank highlight stripe -->
  <rect x="220" y="140" width="20" height="300" rx="10" fill="#66BB6A" opacity="0.5"/>
  <!-- MFP text overlay -->
  <text x="256" y="320" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="white" opacity="0.25" letter-spacing="4">MFP</text>
  <!-- Collar/cap -->
  <rect x="210" y="110" width="92" height="45" rx="8" fill="url(#cap)"/>
  <!-- Valve stem -->
  <rect x="240" y="70" width="32" height="50" rx="4" fill="url(#valve)"/>
  <!-- Valve handle -->
  <rect x="220" y="55" width="72" height="22" rx="11" fill="url(#valve)"/>
  <!-- Tank ring/seam -->
  <ellipse cx="256" cy="160" rx="100" ry="8" fill="none" stroke="#2E7D32" stroke-width="2" opacity="0.5"/>
  <!-- Foot ring -->
  <rect x="170" y="425" width="172" height="15" rx="4" fill="#1B5E20"/>
</svg>
